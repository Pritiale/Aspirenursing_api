<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light only" />
    <title>New subscriber</title>
  </head>
  <body style="margin:0;padding:0;background:#f3f5f9;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#f3f5f9;padding:24px 12px;">
      <tr>
        <td align="center">
          <table role="presentation" width="560" cellpadding="0" cellspacing="0" style="max-width:560px;width:100%;background:#ffffff;border:1px solid #e6e9f0;border-radius:14px;overflow:hidden;font-family:Arial,Helvetica,sans-serif;">
            <tr>
              <td style="background:#0c2461;padding:22px 28px;">
                <span style="color:#ffffff;font-size:20px;font-weight:800;letter-spacing:-0.01em;">ASPIRE</span>
                <span style="color:#8fb4e0;font-size:11px;font-weight:700;letter-spacing:0.14em;display:block;margin-top:3px;">NURSING AGENCY &middot; ADMIN</span>
              </td>
            </tr>
            <tr><td style="height:3px;background:#e23a4e;line-height:3px;font-size:0;">&nbsp;</td></tr>
            <tr>
              <td style="padding:30px 28px;color:#20334a;font-size:15px;line-height:1.6;">
                <h1 style="margin:0 0 16px;font-size:20px;color:#0c2461;">New newsletter subscriber</h1>
                <p style="margin:0 0 16px;">A new person just subscribed on the website:</p>
                <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#f7f9fc;border:1px solid #e6e9f0;border-radius:10px;margin:0 0 18px;">
                  <tr>
                    <td style="padding:16px 18px;">
                      <div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:#6b7688;">Email</div>
                      <div style="font-size:17px;font-weight:700;color:#0c2461;margin-top:4px;">{{subscriber_email}}</div>
                      <div style="font-size:13px;color:#6b7688;margin-top:10px;">Subscribed: {{subscribed_at}}</div>
                    </td>
                  </tr>
                </table>
                <p style="margin:0;color:#6b7688;font-size:14px;">
                  They have been added to the subscriptions table. View everyone in the admin dashboard.
                </p>
              </td>
            </tr>
            <tr>
              <td style="padding:16px 28px;background:#f7f9fc;color:#7a869a;font-size:12px;line-height:1.5;">
                Aspire Nursing Agency &middot; internal notification
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
